# Default server configuration for Passport Laravel 10 project
server {
    # Listen on port 80 (HTTP)
    listen 80;

    # Root directory of your Laravel project (public folder)
    root /var/www/public;

    # Default index files
    index index.php index.html;

    # Accept both localhost and custom domain
    # This allows you to access the app via:
    #   http://localhost
    #   http://passport-laravel10.test
    server_name localhost passport-laravel10.test;

    # Main location block: handle all requests
    location / {
        # Try to serve the requested URI as a file or directory.
        # If it doesn't exist, forward the request to index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        # Forward PHP requests to the PHP-FPM container named "app" on port 9000
        fastcgi_pass app:9000;

        # Default index file
        fastcgi_index index.php;

        # Include default FastCGI parameters
        include fastcgi_params;

        # Specify the full path to the PHP script
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to .ht* files for security
    location ~ /\.ht {
        deny all;
    }
}
